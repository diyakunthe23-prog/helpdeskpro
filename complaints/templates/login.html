<!DOCTYPE html>
<html>
<head>

<title>Login | Complaint Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

/* 🌸 BACKGROUND */
body{
background: linear-gradient(135deg,#fdf2f8,#f0f9ff,#ecfeff);
font-family:'Quicksand',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ✨ SOFT GLOW */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(255,182,193,0.25), transparent 70%);
pointer-events:none;
}

/* 🌷 CARD */
.login-card{
background: rgba(255,255,255,0.75);
border-radius:18px;
padding:35px;
box-shadow:0 15px 35px rgba(255,182,193,0.25);
backdrop-filter: blur(10px);
}

/* ✨ TITLE */
h2{
font-family:'Playfair Display',serif;
color:#7c3aed;
}

/* INPUT */
.form-control{
border-radius:10px;
padding:10px;
border:1px solid #e5e7eb;
}

.form-control:focus{
border-color:#a78bfa;
box-shadow:0 0 0 2px rgba(167,139,250,0.2);
}

/* BUTTON */
.btn-login{
background:linear-gradient(135deg,#c4b5fd,#fbcfe8);
border:none;
color:#4c1d95;
font-weight:500;
padding:10px;
border-radius:10px;
transition:0.3s;
}

.btn-login:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(167,139,250,0.3);
}

/* REGISTER LINK */
.register-link a{
color:#7c3aed;
text-decoration:none;
}
.register-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="login-card">

<h2 class="text-center mb-4">Welcome Back</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert text-center" style="background:#fee2e2; color:#b91c1c; border:none; border-radius:10px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn btn-login w-100">Login</button>

</form>

<p class="text-center mt-3 register-link">
Don't have an account?
<a href="/register/">Create one</a>
</p>

</div>

</div>

</div>

</div>

</body>
</html>
