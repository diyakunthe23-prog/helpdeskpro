<!DOCTYPE html>
<html>
<head>

<title>Register | Complaint Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#fdf2f8,#f0f9ff,#ecfeff);
font-family:'Quicksand',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(134,239,172,0.3), transparent 70%);
pointer-events:none;
}

.register-card{
background: rgba(255,255,255,0.85);
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(134,239,172,0.3);
}

h2{
font-family:'Playfair Display',serif;
color:#16a34a;
}

.form-control{
border-radius:10px;
}

.btn-register{
background:linear-gradient(135deg,#86efac,#bbf7d0);
border:none;
color:#065f46;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-4">

<div class="register-card">

<h2 class="text-center mb-4">Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" class="form-control mb-3" required>

<input type="email" name="email" placeholder="Email" class="form-control mb-3" required>

<input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

<button class="btn btn-register w-100">Register</button>

</form>

<p class="text-center mt-3">
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</div>
</div>
</div>

</body>
</html>
