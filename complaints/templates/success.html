<!DOCTYPE html>
<html>
<head>
<title>Success</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#fdf2f8,#f0f9ff,#ecfeff);
font-family:'Quicksand',sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CARD */
.success-card{
background: rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(134,239,172,0.3);
text-align:center;
}

/* TEXT */
h4{
font-family:'Playfair Display',serif;
color:#16a34a;
}

/* BUTTON */
.btn-success{
background:linear-gradient(135deg,#86efac,#bbf7d0);
border:none;
color:#065f46;
}

</style>

</head>

<body>

<div class="success-card">

<h4>Complaint Submitted Successfully!</h4>

<p class="mt-3">Your issue has been sent to the system </p>

<a href="/" class="btn btn-success mt-3">Submit Another Complaint</a>

<a href="/track/" class="btn btn-outline-primary mt-2">Track Complaint</a>

</div>

</body>
</html>
