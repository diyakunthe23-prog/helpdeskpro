<!DOCTYPE html>
<html>
<head>

<title>Track Complaint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#fdf2f8,#f0f9ff,#ecfeff);
font-family:'Quicksand',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background: radial-gradient(circle, rgba(191,219,254,0.3), transparent 70%);
pointer-events:none;
}

.card{
background: rgba(255,255,255,0.85);
border-radius:18px;
border:none;
box-shadow:0 15px 35px rgba(191,219,254,0.3);
}

h3{
font-family:'Playfair Display',serif;
color:#3b82f6;
}

.form-control{
border-radius:10px;
}

.btn-track{
background:linear-gradient(135deg,#93c5fd,#c4b5fd);
border:none;
color:#1e3a8a;
border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar px-3 bg-light">
<a class="navbar-brand">HelpDeskPro</a>
<a href="/" class="btn btn-light">Dashboard</a>
</nav>

<div class="container mt-5 flex-grow-1">

<h3>Track Your Complaint</h3>

<form method="POST">
{% csrf_token %}

<input type="number" name="complaint_id" class="form-control mb-3" placeholder="Enter Complaint ID">

<button class="btn btn-track">Track</button>

</form>

{% if complaint %}
<div class="card mt-4 p-3">
<p><b>ID:</b> {{ complaint.id }}</p>
<p><b>Title:</b> {{ complaint.title }}</p>
<p><b>Status:</b> {{ complaint.status }}</p>
</div>
{% endif %}

{% if error %}
<div class="alert alert-danger mt-3 text-center">
{{ error }}
</div>
{% endif %}

</div>

<footer class="text-center mt-5 p-3">
Complaint Service © 2026 | Complaint Management System
</footer>

</body>
</html>
